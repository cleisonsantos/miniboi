name: Deploy to OCI

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Oracle Cloud Container Registry (OCIR)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGION }}.ocir.io
          username: ${{ secrets.OCI_NAMESPACE }}/${{ secrets.OCI_USER_OCID }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_NAMESPACE }}/miniboi:latest
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_NAMESPACE }}/miniboi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Nota: Para o deploy automático na instância, você precisaria de uma secret adicional 
  # com a chave SSH (ex: OCI_SSH_PRIVATE_KEY) e o IP da instância (OCI_INSTANCE_IP).
  # Caso queira que eu adicione o passo de SSH para atualizar o bot na VPS, me avise!
